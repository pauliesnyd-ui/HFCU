<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Segoe UI", sans-serif;
      color: white;
    }

    .quote-box {
      padding: 24px;
      max-width: 700px;
    }

    .quote {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.4;
    }

    .author {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.85;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="quote-box">
    <div class="quote" id="quote">Loading quote…</div>
    <div class="author" id="author"></div>
  </div>

<script>
(async function () {
  const quoteEl = document.getElementById("quote");
  const authorEl = document.getElementById("author");

  quoteEl.textContent = "Loading quote…";

  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 3000); // timeout safeguard

    const response = await fetch(
      "https://zenquotes.io/api/random",
      { signal: controller.signal }
    );

    if (!response.ok) {
      throw new Error("Network response was not ok");
    }

    const data = await response.json();

    // ZenQuotes returns an array
    quoteEl.textContent = data[0].q;
    authorEl.textContent = "— " + data[0].a;

  } catch (err) {
    quoteEl.textContent =
      "Small steps, taken consistently, lead to meaningful change.";
    authorEl.textContent = "— Horizon Intranet";
  }
})();
</script>

</body>
</html>
