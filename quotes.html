<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Segoe UI", sans-serif;
      color: white;
    }

    .quote-box {
      padding: 24px;
      max-width: 700px;
    }

    .quote {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.4;
    }

    .author {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.85;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="quote-box">
    <div class="quote" id="quote">Loading quote…</div>
    <div class="author" id="author"></div>
  </div>

<script>
(async function () {
  const today = new Date().toISOString().split("T")[0];
  const savedDate = localStorage.getItem("quoteDate");

  if (savedDate !== today) {
    const response = await fetch(
      "https://api.quotable.io/random?tags=inspirational|success|happiness"
    );
    const data = await response.json();

    localStorage.setItem("quoteText", data.content);
    localStorage.setItem("quoteAuthor", data.author);
    localStorage.setItem("quoteDate", today);
  }

  document.getElementById("quote").textContent =
    localStorage.getItem("quoteText");

  document.getElementById("author").textContent =
    "— " + localStorage.getItem("quoteAuthor");
})();
</script>

</body>
</html>
