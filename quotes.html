<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Segoe UI", sans-serif;
      color: white;
    }

    .quote-box {
      padding: 24px;
      max-width: 700px;
    }

    .quote {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.4;
    }

    .author {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.85;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="quote-box">
    <div class="quote" id="quote">Loading quote…</div>
    <div class="author" id="author"></div>
  </div>

<script>
(async function () {
  const today = new Date().toISOString().split("T")[0];

  const fallback = {
    text: "Great things are done by a series of small things brought together.",
    author: "Vincent Van Gogh"
  };

  try {
    const storedDate = localStorage.getItem("quoteDate");

    if (storedDate !== today) {
      const controller = new AbortController();
      setTimeout(() => controller.abort(), 3000); // 3s timeout

      const response = await fetch(
        "https://api.quotable.io/random?tags=inspirational|success|happiness",
        { signal: controller.signal }
      );

      if (!response.ok) throw new Error("Bad response");

      const data = await response.json();

      localStorage.setItem("quoteText", data.content);
      localStorage.setItem("quoteAuthor", data.author);
      localStorage.setItem("quoteDate", today);
    }

    document.getElementById("quote").textContent =
      localStorage.getItem("quoteText") || fallback.text;

    document.getElementById("author").textContent =
      "— " + (localStorage.getItem("quoteAuthor") || fallback.author);

  } catch (err) {
    // API failed — show fallback immediately
    document.getElementById("quote").textContent = fallback.text;
    document.getElementById("author").textContent = "— " + fallback.author;
  }
})();
</script>

</body>
</html>
